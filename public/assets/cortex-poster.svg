<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" aria-label="Cortex graph (static poster)">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141416"></stop>
      <stop offset="60%" stop-color="#0B0B0C"></stop>
      <stop offset="100%" stop-color="#050507"></stop>
    </radialGradient>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"></rect>

  
  <g stroke="#4A6FA5" stroke-opacity="0.32" stroke-width="1" fill="none">
    <line x1="400" y1="300" x2="220" y2="180"></line>
    <line x1="400" y1="300" x2="580" y2="160"></line>
    <line x1="400" y1="300" x2="640" y2="380"></line>
    <line x1="400" y1="300" x2="500" y2="500"></line>
    <line x1="400" y1="300" x2="200" y2="460"></line>
    <line x1="400" y1="300" x2="140" y2="320"></line>
    <line x1="220" y1="180" x2="140" y2="320"></line>
    <line x1="580" y1="160" x2="640" y2="380"></line>
    <line x1="500" y1="500" x2="640" y2="380"></line>
    <line x1="200" y1="460" x2="140" y2="320"></line>
    <line x1="220" y1="180" x2="580" y2="160"></line>
  </g>
  <g stroke="#C8553D" stroke-opacity="0.5" stroke-width="1.4" fill="none">
    <line x1="400" y1="300" x2="220" y2="180"></line>
    <line x1="400" y1="300" x2="500" y2="500"></line>
  </g>

  
  <g filter="url(#nodeGlow)">
    <circle cx="400" cy="300" r="9" fill="#F2EEE5"></circle>
    <circle cx="220" cy="180" r="7" fill="#C8553D"></circle>
    <circle cx="580" cy="160" r="7" fill="#4A6FA5"></circle>
    <circle cx="640" cy="380" r="7" fill="#4A6FA5"></circle>
    <circle cx="500" cy="500" r="7" fill="#C8553D"></circle>
    <circle cx="200" cy="460" r="7" fill="#4A6FA5"></circle>
    <circle cx="140" cy="320" r="6" fill="#B8B2A4"></circle>
  </g>

  
  <g fill="#6E6A60">
    <circle cx="320" cy="120" r="3"></circle>
    <circle cx="700" cy="240" r="3"></circle>
    <circle cx="720" cy="460" r="3"></circle>
    <circle cx="380" cy="520" r="3"></circle>
    <circle cx="100" cy="220" r="3"></circle>
    <circle cx="80" cy="420" r="3"></circle>
  </g>

  
  <g font-family="IBM Plex Mono, monospace" font-size="11" fill="#B8B2A4" letter-spacing="0.16em" text-transform="uppercase">
    <text x="412" y="296">CORTEX</text>
    <text x="180" y="170" text-anchor="end">AI TRANSFORMATION</text>
    <text x="592" y="150">FUTURE OF MEDIA</text>
    <text x="652" y="380">CREATIVE CULTURE</text>
    <text x="510" y="500">JAZZ SWING</text>
    <text x="190" y="476" text-anchor="end">HOMELAB</text>
  </g>
</svg>