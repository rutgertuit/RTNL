steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - europe-west4-docker.pkg.dev/${PROJECT_ID}/rutgertuit/web:${BUILD_ID}
      - -t
      - europe-west4-docker.pkg.dev/${PROJECT_ID}/rutgertuit/web:latest
      - -f
      - Dockerfile
      - .
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - europe-west4-docker.pkg.dev/${PROJECT_ID}/rutgertuit/web
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - rutgertuit-web
      - --image=europe-west4-docker.pkg.dev/${PROJECT_ID}/rutgertuit/web:${BUILD_ID}
      - --region=europe-west4
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --max-instances=10
      - --min-instances=0

images:
  - europe-west4-docker.pkg.dev/${PROJECT_ID}/rutgertuit/web

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
